name: Build Minecraft Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'        # Принудительно ставим Java 21
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package
      working-directory: ./plugin # Заходим в папку с плагином перед сборкой

    - name: Upload Compiled Jar
      uses: actions/upload-artifact@v4
      with:
        name: PistonFilter-Plugin
        path: plugin/target/PistonFilter-1.0.0.jar
